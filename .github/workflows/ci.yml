name: CI — MVP Quantum Materials

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint — ruff check
        run: ruff check .

      - name: Format — ruff format check
        run: ruff format --check .

      - name: Test — pytest with coverage
        run: pytest -v --tb=short --cov=mvp_quantum_materials --cov-report=term-missing --cov-fail-under=70

      - name: Generate results
        run: python scripts/generate_all_results.py --output-dir results/figures

      - name: Verify v0.1 figures (>= 4)
        run: |
          FIGURE_COUNT=$(ls results/figures/*.png 2>/dev/null | wc -l)
          echo "Figures generated: $FIGURE_COUNT"
          if [ "$FIGURE_COUNT" -lt 4 ]; then
            echo "ERROR: Expected >= 4 figures, got $FIGURE_COUNT"
            exit 1
          fi

      - name: Verify v0.2 artifacts
        run: |
          # v0.2 figures
          test -f results/figures/thermal_2d_final.png || { echo "ERROR: thermal_2d_final.png missing"; exit 1; }
          test -f results/figures/convergence_analysis.png || { echo "ERROR: convergence_analysis.png missing"; exit 1; }
          echo "v0.2 figures: OK"

          # v0.2 CSV
          test -f results/tables/convergence_results.csv || { echo "ERROR: convergence_results.csv missing"; exit 1; }
          echo "v0.2 convergence CSV: OK"

          # v0.1 CSV (non-regression)
          test -f results/tables/sensitivity_results.csv || { echo "ERROR: sensitivity_results.csv missing"; exit 1; }
          echo "v0.1 sensitivity CSV: OK"

          # Total figure count (>= 6)
          TOTAL=$(ls results/figures/*.png 2>/dev/null | wc -l)
          echo "Total figures: $TOTAL"
          if [ "$TOTAL" -lt 6 ]; then
            echo "ERROR: Expected >= 6 total figures, got $TOTAL"
            exit 1
          fi

      - name: Verify v0.3 artifacts
        run: |
          # v0.3 figure
          test -f results/figures/defect_2d_final.png || { echo "ERROR: defect_2d_final.png missing"; exit 1; }
          echo "v0.3 defect figure: OK"

          # v0.3 CSVs
          test -f results/tables/defect_metrics.csv || { echo "ERROR: defect_metrics.csv missing"; exit 1; }
          test -f results/tables/defect_final_snapshot.csv || { echo "ERROR: defect_final_snapshot.csv missing"; exit 1; }
          echo "v0.3 defect CSVs: OK"

          # Total CSV count (>= 4)
          CSV_COUNT=$(ls results/tables/*.csv 2>/dev/null | wc -l)
          echo "Total CSVs: $CSV_COUNT"
          if [ "$CSV_COUNT" -lt 4 ]; then
            echo "ERROR: Expected >= 4 CSVs, got $CSV_COUNT"
            exit 1
          fi

      - name: Upload results artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-py${{ matrix.python-version }}
          path: results/
          retention-days: 30
