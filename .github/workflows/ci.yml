name: CI — MVP Quantum Materials

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint — ruff check
        run: ruff check .

      - name: Format — ruff format check
        run: ruff format --check .

      - name: Test — pytest
        run: pytest -v --tb=short

      - name: Generate results
        run: python scripts/generate_all_results.py --output-dir results/figures

      - name: Verify figures (>= 3)
        run: |
          FIGURE_COUNT=$(ls results/figures/*.png 2>/dev/null | wc -l)
          echo "Figures generated: $FIGURE_COUNT"
          if [ "$FIGURE_COUNT" -lt 3 ]; then
            echo "ERROR: Expected >= 3 figures, got $FIGURE_COUNT"
            exit 1
          fi

      - name: Upload results artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-py${{ matrix.python-version }}
          path: results/
          retention-days: 30
